name: Release Bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build distributable bundle
        run: ./scripts/build-bundle.sh

      - name: Generate checksums
        run: |
          shasum -a 256 dist/MacMini-Cursor-Setup.command > dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/MacMini-Cursor-Setup.command
            dist/SHA256SUMS.txt
